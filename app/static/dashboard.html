<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolicyPay Dashboard</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --bg-soft: #dce7f5;
        --text: #12233f;
        --text-muted: #4a607f;
        --card: rgba(255, 255, 255, 0.86);
        --line: #c2d2e6;
        --accent: #0d5eb7;
        --accent-soft: #dbeafe;
        --ok: #137a3b;
        --warn: #9a3412;
        --radius: 14px;
        --shadow: 0 14px 30px rgba(15, 42, 81, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 15%, #fefce8 0%, transparent 35%),
          radial-gradient(circle at 85% 10%, #dbeafe 0%, transparent 34%),
          linear-gradient(135deg, var(--bg), var(--bg-soft));
      }

      .layout {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 40px;
        display: grid;
        gap: 18px;
      }

      .hero {
        border-radius: var(--radius);
        padding: 20px 22px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--text-muted);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      }

      .grid.three {
        grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--card);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      h3 {
        margin: 14px 0 8px;
        font-size: 15px;
      }

      label {
        display: block;
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--text-muted);
      }

      input,
      textarea,
      button,
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px;
        font: inherit;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
      }

      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      }

      button {
        border: none;
        background: linear-gradient(135deg, #0d5eb7, #2563eb);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
      }

      .ghost {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--accent);
        background: var(--accent-soft);
      }

      .pane {
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #f8fbff;
        padding: 12px;
      }

      pre {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 13px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .status.ok {
        border-color: #86efac;
        background: #f0fdf4;
        color: var(--ok);
      }

      .status.err {
        border-color: #fdba74;
        background: #fff7ed;
        color: var(--warn);
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <h1>PolicyPay 支付工作台</h1>
        <p class="subtitle">
          面向业务人员的付款申请与审批控制台，支持单笔、批量、链上 Batch 全流程。
        </p>
        <div class="meta">
          <span class="pill">付款单创建</span>
          <span class="pill">审批与重试</span>
          <span class="pill">审计 / 执行 / 时间线</span>
        </div>
        <div class="row" style="margin-top: 12px">
          <label
            >接口密钥（可选）
            <input
              id="api-key"
              placeholder="未启用认证可留空；启用后填写 x-api-key"
            />
          </label>
        </div>
      </section>

      <section class="grid two">
        <article class="card">
          <h2>创建单笔付款单</h2>
          <form id="single-form">
            <label
              >支付规则编号（Policy 地址）
              <input id="single-policy" required placeholder="示例：policy-pda" />
            </label>
            <div class="row">
              <label
                >付款单号（Intent ID）
                <input id="single-intent-id" required type="number" min="0" placeholder="101" />
              </label>
              <label
                >付款金额（最小单位）
                <input id="single-amount" required type="number" min="1" placeholder="100" />
              </label>
            </div>
            <label
              >收款地址（钱包公钥）
              <input id="single-recipient" required placeholder="recipient pubkey" />
            </label>
            <label
              >付款备注（Memo）
              <input id="single-memo" placeholder="invoice-101" />
            </label>
            <label
              >业务流水号（Reference）
              <input id="single-reference" placeholder="ref-101" />
            </label>
            <button type="submit">创建付款单</button>
          </form>
          <div id="single-status" class="status">等待提交</div>
        </article>

        <article class="card">
          <h2>批量创建付款单（兼容模式）</h2>
          <form id="batch-form">
            <label
              >支付规则编号（Policy 地址）
              <input id="batch-policy" required placeholder="示例：policy-pda" />
            </label>
            <label
              >批量模式
              <select id="batch-mode">
                <option value="abort-on-error">遇错即停（abort-on-error）</option>
                <option value="continue-on-error">继续处理（continue-on-error）</option>
              </select>
            </label>
            <label
              >批量明细（每行一条，格式：付款单号,收款地址,金额,备注,业务流水号）
              <textarea id="batch-items" required>201,recipient-a,100,invoice-201,ref-201
202,recipient-b,250,invoice-202,ref-202</textarea>
            </label>
            <button type="submit">批量创建付款单</button>
          </form>
          <div id="batch-status" class="status">等待提交</div>
        </article>
      </section>

      <section class="grid two">
        <article class="card">
          <h2>批量审批（兼容模式）</h2>
          <form id="approve-form">
            <label
              >支付规则编号（Policy 地址）
              <input id="approve-policy" required placeholder="示例：policy-pda" />
            </label>
            <label
              >付款单号列表（逗号分隔）
              <input id="approve-ids" required placeholder="201,202,203" />
            </label>
            <label
              >审批模式
              <select id="approve-mode">
                <option value="abort-on-error">遇错即停（abort-on-error）</option>
                <option value="continue-on-error">继续处理（continue-on-error）</option>
              </select>
            </label>
            <button type="submit">批量审批</button>
          </form>
          <div id="approve-status" class="status">等待提交</div>
        </article>

        <article class="card">
          <h2>面板刷新</h2>
          <div class="row">
            <button class="ghost" id="refresh-all" type="button">刷新全部面板</button>
            <button class="ghost" id="refresh-summary" type="button">刷新摘要</button>
          </div>
          <div class="pane" style="margin-top: 10px">
            <pre id="summary-pane">{}</pre>
          </div>
        </article>
      </section>

      <section class="grid two">
        <article class="card">
          <h2>链上 BatchIntent 全流程（批处理）</h2>
          <label
            >支付规则编号（Policy 地址）
            <input id="onchain-policy" placeholder="示例：policy-pda" required />
          </label>
          <div class="row">
            <label
              >批次编号（Batch ID）
              <input id="onchain-batch-id" type="number" min="0" placeholder="5001" required />
            </label>
            <label
              >批次模式
              <select id="onchain-mode">
                <option value="abort-on-error">遇错即停（abort-on-error）</option>
                <option value="continue-on-error">继续处理（continue-on-error）</option>
              </select>
            </label>
          </div>

          <h3>1) 创建批次</h3>
          <button type="button" id="onchain-create-batch">创建链上批次</button>

          <h3>2) 添加批次明细</h3>
          <div class="row">
            <label
              >付款单号（Intent ID）
              <input id="onchain-intent-id" type="number" min="0" placeholder="50011" />
            </label>
            <label
              >付款金额
              <input id="onchain-amount" type="number" min="1" placeholder="100" />
            </label>
          </div>
          <label
            >收款地址
            <input id="onchain-recipient" placeholder="recipient pubkey" />
          </label>
          <label
            >付款备注（Memo）
            <input id="onchain-memo" placeholder="invoice-50011" />
          </label>
          <label
            >业务流水号（Reference）
            <input id="onchain-reference" placeholder="ref-50011" />
          </label>
          <button type="button" id="onchain-add-item">添加明细</button>

          <h3>3) 提交审批 / 审批 / 取消 / 查询</h3>
          <div class="row">
            <button type="button" id="onchain-submit-batch">提交审批</button>
            <button type="button" id="onchain-approve-batch">审批批次</button>
            <button type="button" id="onchain-cancel-batch">取消批次</button>
            <button type="button" class="ghost" id="onchain-fetch-batch">查询批次</button>
          </div>

          <div id="onchain-status" class="status">等待操作</div>
        </article>

        <article class="card">
          <h2>批次查询结果</h2>
          <div class="pane">
            <pre id="onchain-batch-pane">{}</pre>
          </div>
        </article>
      </section>

      <section class="grid three">
        <article class="card">
          <h2>审计日志</h2>
          <div class="pane"><pre id="audit-pane">[]</pre></div>
        </article>
        <article class="card">
          <h2>执行记录</h2>
          <div class="pane"><pre id="execution-pane">[]</pre></div>
        </article>
        <article class="card">
          <h2>状态时间线</h2>
          <div class="pane"><pre id="timeline-pane">[]</pre></div>
        </article>
      </section>
    </main>

    <script>
      const byId = (id) => document.getElementById(id);

      const setStatus = (id, message, kind) => {
        const el = byId(id);
        el.textContent = message;
        el.className = kind ? "status " + kind : "status";
      };

      const asPrettyJson = (value) => JSON.stringify(value, null, 2);

      const buildHeaders = (baseHeaders = {}) => {
        const headers = { ...baseHeaders };
        const apiKey = byId("api-key").value.trim();
        if (apiKey) {
          headers["x-api-key"] = apiKey;
        }
        return headers;
      };

      const requestJson = async (url, options) => {
        const requestOptions = options ? { ...options } : {};
        requestOptions.headers = buildHeaders(requestOptions.headers || {});

        const response = await fetch(url, requestOptions);
        let body;

        try {
          body = await response.json();
        } catch (_error) {
          body = { error: "invalid-json-response" };
        }

        if (!response.ok) {
          throw new Error(body.error || response.statusText);
        }

        return body;
      };

      const parseBatchItems = (text) => {
        const lines = text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter((line) => line.length > 0);

        if (lines.length === 0) {
          throw new Error("请至少填写一行批量明细");
        }

        return lines.map((line, index) => {
          const parts = line.split(",").map((part) => part.trim());
          if (parts.length < 5) {
            throw new Error(
              `第 ${index + 1} 行格式错误，应为：付款单号,收款地址,金额,备注,业务流水号`
            );
          }

          const [intentIdRaw, recipient, amountRaw, memo, reference] = parts;
          const intentId = Number(intentIdRaw);
          const amount = Number(amountRaw);

          if (!Number.isSafeInteger(intentId) || intentId < 0) {
            throw new Error(`第 ${index + 1} 行付款单号必须是非负整数`);
          }

          if (!recipient) {
            throw new Error(`第 ${index + 1} 行收款地址不能为空`);
          }

          if (!Number.isSafeInteger(amount) || amount <= 0) {
            throw new Error(`第 ${index + 1} 行金额必须是正整数`);
          }

          return {
            intentId,
            recipient,
            amount,
            memo: memo || "",
            reference: reference || "",
          };
        });
      };

      const refreshPanels = async () => {
        const [summary, auditLogs, executions, timeline] = await Promise.all([
          requestJson("/api/summary"),
          requestJson("/api/audit-logs"),
          requestJson("/api/executions"),
          requestJson("/api/timeline"),
        ]);

        byId("summary-pane").textContent = asPrettyJson(summary);
        byId("audit-pane").textContent = asPrettyJson(auditLogs.items || []);
        byId("execution-pane").textContent = asPrettyJson(
          executions.items || []
        );
        byId("timeline-pane").textContent = asPrettyJson(timeline.items || []);
      };

      byId("single-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          policy: byId("single-policy").value,
          intentId: Number(byId("single-intent-id").value),
          recipient: byId("single-recipient").value,
          amount: Number(byId("single-amount").value),
          memo: byId("single-memo").value,
          reference: byId("single-reference").value,
        };

        try {
          const response = await requestJson("/api/intents", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          setStatus(
            "single-status",
            "创建付款单成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("single-status", String(error), "err");
        }
      });

      byId("batch-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          const items = parseBatchItems(byId("batch-items").value);
          const payload = {
            policy: byId("batch-policy").value,
            mode: byId("batch-mode").value,
            items,
          };

          const response = await requestJson("/api/intents/batch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          setStatus(
            "batch-status",
            "批量创建完成: " + asPrettyJson(response.summary || response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("batch-status", String(error), "err");
        }
      });

      byId("approve-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          const intentIds = byId("approve-ids")
            .value.split(",")
            .map((item) => Number(item.trim()))
            .filter((item) => Number.isSafeInteger(item) && item >= 0);

          const payload = {
            policy: byId("approve-policy").value,
            mode: byId("approve-mode").value,
            intentIds,
          };

          const response = await requestJson("/api/intents/batch/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          setStatus(
            "approve-status",
            "批量审批完成: " + asPrettyJson(response.summary || response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("approve-status", String(error), "err");
        }
      });

      const getOnchainBase = () => ({
        policy: byId("onchain-policy").value,
        batchId: Number(byId("onchain-batch-id").value),
      });

      byId("onchain-create-batch").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson("/api/batches", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              policy,
              batchId,
              mode: byId("onchain-mode").value,
            }),
          });

          setStatus(
            "onchain-status",
            "链上批次创建成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("onchain-add-item").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson(`/api/batches/${batchId}/items`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              policy,
              intentId: Number(byId("onchain-intent-id").value),
              recipient: byId("onchain-recipient").value,
              amount: Number(byId("onchain-amount").value),
              memo: byId("onchain-memo").value,
              reference: byId("onchain-reference").value,
            }),
          });

          setStatus(
            "onchain-status",
            "链上批次添加明细成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("onchain-submit-batch").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson(`/api/batches/${batchId}/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ policy }),
          });

          setStatus(
            "onchain-status",
            "链上批次提交审批成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("onchain-approve-batch").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson(`/api/batches/${batchId}/approve`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ policy }),
          });

          setStatus(
            "onchain-status",
            "链上批次审批成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("onchain-cancel-batch").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson(`/api/batches/${batchId}/cancel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ policy }),
          });

          setStatus(
            "onchain-status",
            "链上批次取消成功: " + asPrettyJson(response),
            "ok"
          );
          await refreshPanels();
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("onchain-fetch-batch").addEventListener("click", async () => {
        try {
          const { policy, batchId } = getOnchainBase();
          const response = await requestJson(
            `/api/policies/${encodeURIComponent(policy)}/batches/${batchId}`
          );

          byId("onchain-batch-pane").textContent = asPrettyJson(response);
          setStatus("onchain-status", "批次查询成功", "ok");
        } catch (error) {
          setStatus("onchain-status", String(error), "err");
        }
      });

      byId("refresh-all").addEventListener("click", async () => {
        try {
          await refreshPanels();
        } catch (error) {
          setStatus("approve-status", String(error), "err");
        }
      });

      byId("refresh-summary").addEventListener("click", async () => {
        try {
          const summary = await requestJson("/api/summary");
          byId("summary-pane").textContent = asPrettyJson(summary);
        } catch (error) {
          setStatus("approve-status", String(error), "err");
        }
      });

      refreshPanels().catch((error) => {
        setStatus("approve-status", String(error), "err");
      });
    </script>
  </body>
</html>
